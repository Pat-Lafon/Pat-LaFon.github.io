name: Check meditation audio URLs

on:
  push:
    branches: [main]
    paths:
      - 'meditation/index.html'
      - '.github/workflows/audio-urls.yml'
  pull_request:
    paths:
      - 'meditation/index.html'
      - '.github/workflows/audio-urls.yml'
  schedule:
    # Weekly, Monday 09:00 UTC. Third-party URLs go stale; this surfaces it
    # without blocking deploys.
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Check audio URLs
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --include '\.mp3$' meditation/index.html
          fail: true
