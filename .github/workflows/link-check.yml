name: Site link check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, Monday 08:00 UTC. Surfaces external link rot without blocking deploys.
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run build
      - name: Extract meditation audio URLs
        # Lychee doesn't parse JS, so surface the hardcoded audio URLs from
        # meditation/app.js as a plaintext file it can scan. Not shipped to
        # _site — only exists in CI.
        run: grep -oE 'https?://[^"'\''`)[:space:]]+\.(mp3|m4a|wav|ogg)' meditation/app.js | sort -u > meditation-audio-urls.txt
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir resolves root-relative paths (`/about/`) against _site/.
          # Lychee requires an absolute path here, hence $GITHUB_WORKSPACE.
          # --accept tolerates common bot-rejection codes from external sites.
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}/_site
            --accept '200..=299, 403, 429'
            _site
            meditation-audio-urls.txt
          fail: true
