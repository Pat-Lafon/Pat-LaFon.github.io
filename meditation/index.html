<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meditation</title>
<meta name="description" content="Box breathing guide and guided meditation sessions with offline support." />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta property="og:title" content="Meditation" />
<meta property="og:description" content="Box breathing and guided meditation with offline support." />
<meta property="og:type" content="website" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='15' y='15' width='70' height='70' rx='10' fill='none' stroke='%2360a5fa' stroke-width='6'/%3E%3Ccircle cx='85' cy='15' r='8' fill='%2360a5fa'/%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #334155 100%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* --- Tabs --- */
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 8px;
    overflow: hidden;
  }
  .tab-btn {
    background: transparent;
    color: #94a3b8;
    border: none;
    padding: 10px 24px;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    font-family: inherit;
    transition: all 0.2s ease;
    border-radius: 0;
  }
  .tab-btn:hover { background: rgba(148, 163, 184, 0.1); }
  .tab-btn.active {
    background: rgba(96, 165, 250, 0.2);
    color: #e2e8f0;
  }
  .view { display: none; width: 100%; max-width: 480px; }
  .view.active {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- Breathe view --- */
  h1 {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .subtitle {
    font-size: 0.85rem;
    opacity: 0.6;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }
  .box-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 40px;
  }
  .box {
    width: 100%;
    height: 100%;
    border: 2px solid rgba(148, 163, 184, 0.3);
    border-radius: 12px;
    position: relative;
  }
  .dot {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #60a5fa;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(96, 165, 250, 0.8);
    top: -10px;
    left: -10px;
    transition: none;
  }
  .center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .phase {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .count {
    font-size: 3rem;
    font-weight: 200;
    color: #60a5fa;
  }
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: rgba(96, 165, 250, 0.15);
    color: #e2e8f0;
    border: 1px solid rgba(96, 165, 250, 0.4);
    padding: 12px 28px;
    font-size: 0.95rem;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  button:hover { background: rgba(96, 165, 250, 0.3); }
  button:active { transform: scale(0.97); }
  .duration-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .chip {
    background: rgba(148, 163, 184, 0.1);
    color: #cbd5e1;
    border: 1px solid rgba(148, 163, 184, 0.25);
    padding: 8px 16px;
    font-size: 0.85rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .chip:hover { background: rgba(148, 163, 184, 0.2); }
  .chip.active {
    background: rgba(96, 165, 250, 0.25);
    border-color: rgba(96, 165, 250, 0.6);
    color: #e2e8f0;
  }
  .remaining {
    margin-top: 16px;
    font-size: 0.9rem;
    opacity: 0.6;
    letter-spacing: 0.05em;
    min-height: 1.2em;
  }

  /* --- Guided view --- */
  .session-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    max-height: 50vh;
    overflow-y: auto;
    padding-right: 4px;
  }
  .session-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(148, 163, 184, 0.08);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .session-item:hover { background: rgba(96, 165, 250, 0.12); border-color: rgba(96, 165, 250, 0.3); }
  .session-item.playing { background: rgba(96, 165, 250, 0.15); border-color: rgba(96, 165, 250, 0.5); }
  .session-info { flex: 1; min-width: 0; }
  .session-title {
    font-size: 0.95rem;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-meta {
    font-size: 0.75rem;
    opacity: 0.5;
    margin-top: 2px;
  }
  .session-duration {
    font-size: 0.8rem;
    opacity: 0.6;
    white-space: nowrap;
  }
  .session-cached {
    color: #34d399;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .player-status {
    font-size: 0.8rem;
    opacity: 0.6;
    margin-bottom: 8px;
    min-height: 1.2em;
  }
  .player-status.error { color: #f87171; opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }

  /* --- Audio player --- */
  .player {
    width: 100%;
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid rgba(96, 165, 250, 0.3);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .player.active { display: block; }
  .player-title {
    font-size: 0.9rem;
    font-weight: 400;
    margin-bottom: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .play-btn {
    background: rgba(96, 165, 250, 0.2);
    border: 1px solid rgba(96, 165, 250, 0.5);
    color: #e2e8f0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    flex-shrink: 0;
  }
  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(148, 163, 184, 0.2);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .progress-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #60a5fa;
    cursor: pointer;
  }
  .progress-bar::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #60a5fa;
    cursor: pointer;
    border: none;
  }
  .progress-bar::-webkit-slider-runnable-track {
    height: 6px;
    border-radius: 3px;
  }
  .player-time {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    opacity: 0.5;
  }
  .player-close {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 4px;
    line-height: 1;
    flex-shrink: 0;
  }
  .player-close:hover { color: #e2e8f0; background: none; }

  /* --- Cache management --- */
  .cache-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    opacity: 0.5;
    padding: 8px 0;
  }
  .cache-clear {
    background: none;
    border: none;
    color: #f87171;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 2px 8px;
    font-family: inherit;
  }
  .cache-clear:hover { opacity: 0.8; background: none; }

  /* --- Attribution --- */
  .attribution {
    font-size: 0.65rem;
    opacity: 0.35;
    text-align: center;
    margin-top: 12px;
    line-height: 1.5;
    max-width: 400px;
  }
  .attribution a { color: inherit; }
</style>
</head>
<body>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="breathe">Breathe</button>
    <button class="tab-btn" data-tab="guided">Guided</button>
  </div>

  <!-- ===== Breathe View ===== -->
  <div class="view active" id="breathe-view">
    <h1>Box Breathing</h1>
    <div class="subtitle">4 · 4 · 4 · 4</div>

    <div class="box-container">
      <div class="box"></div>
      <div class="dot" id="dot"></div>
      <div class="center-text">
        <div class="phase" id="phase">Ready</div>
        <div class="count" id="count">&mdash;</div>
      </div>
    </div>

    <div class="duration-row">
      <button class="chip" data-minutes="0">&infin; Open</button>
      <button class="chip" data-minutes="2">2 min</button>
      <button class="chip active" data-minutes="5">5 min</button>
      <button class="chip" data-minutes="10">10 min</button>
      <button class="chip" data-minutes="15">15 min</button>
      <button class="chip" data-minutes="20">20 min</button>
    </div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="pauseBtn" style="display:none">Pause</button>
      <button id="resumeBtn" style="display:none">Resume</button>
      <button id="stopBtn" style="display:none">Stop</button>
    </div>

    <div class="remaining" id="remaining"></div>

  </div>

  <!-- ===== Guided View ===== -->
  <div class="view" id="guided-view">
    <div class="player" id="player">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="player-title" id="playerTitle"></div>
        <button class="player-close" id="playerClose" title="Close">&times;</button>
      </div>
      <div class="player-status" id="playerStatus"></div>
      <div class="player-controls">
        <button class="play-btn" id="playBtn">&#9654;</button>
        <div class="progress-wrap">
          <input type="range" class="progress-bar" id="progressBar" min="0" max="1000" value="0" />
          <div class="player-time">
            <span id="elapsed">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>
      </div>
    </div>

    <div class="session-list" id="sessionList"></div>

    <div class="cache-bar" id="cacheBar">
      <span id="cacheSize">Cached: 0 MB</span>
      <button class="cache-clear" id="cacheClear">Clear all downloads</button>
    </div>

    <div class="attribution">
      UCLA meditations &copy; UC Regents, <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">CC BY-NC-ND 4.0</a>.
      DoD meditations via <a href="https://www.dvidshub.net/" target="_blank" rel="noopener noreferrer">DVIDS</a>, public domain.
      VA meditations via <a href="https://www.warrelatedillness.va.gov/" target="_blank" rel="noopener noreferrer">VA WRIISC</a>.
    </div>
  </div>

<audio id="audio" preload="none"></audio>

<script src="app.js" defer></script>
</body>
</html>
