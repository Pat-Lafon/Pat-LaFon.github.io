<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meditation</title>
<meta name="description" content="Box breathing guide and guided meditation sessions with offline support." />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta property="og:title" content="Meditation" />
<meta property="og:description" content="Box breathing and guided meditation with offline support." />
<meta property="og:type" content="website" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='15' y='15' width='70' height='70' rx='10' fill='none' stroke='%2360a5fa' stroke-width='6'/%3E%3Ccircle cx='85' cy='15' r='8' fill='%2360a5fa'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<main>
  <div class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="breathe" role="tab" id="breathe-tab" aria-selected="true" aria-controls="breathe-view" tabindex="0">Breathe</button>
    <button class="tab-btn" data-tab="guided" role="tab" id="guided-tab" aria-selected="false" aria-controls="guided-view" tabindex="-1">Guided</button>
  </div>

  <!-- ===== Breathe View ===== -->
  <div class="view active" id="breathe-view" role="tabpanel" aria-labelledby="breathe-tab">
    <h1>Box Breathing</h1>
    <div class="subtitle">4 · 4 · 4 · 4</div>

    <div class="box-container">
      <div class="box"></div>
      <div class="dot" id="dot"></div>
      <div class="center-text">
        <div class="phase" id="phase" aria-live="polite" aria-atomic="true">Ready</div>
        <div class="count" id="count">&mdash;</div>
      </div>
    </div>

    <div class="duration-row">
      <button class="chip" data-minutes="0">&infin; Open</button>
      <button class="chip" data-minutes="2">2 min</button>
      <button class="chip active" data-minutes="5">5 min</button>
      <button class="chip" data-minutes="10">10 min</button>
      <button class="chip" data-minutes="15">15 min</button>
      <button class="chip" data-minutes="20">20 min</button>
    </div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="pauseBtn" hidden>Pause</button>
      <button id="resumeBtn" hidden>Resume</button>
      <button id="stopBtn" hidden>Stop</button>
    </div>

    <div class="remaining" id="remaining"></div>

  </div>

  <!-- ===== Guided View ===== -->
  <div class="view" id="guided-view" role="tabpanel" aria-labelledby="guided-tab">
    <h1>Guided Sessions</h1>

    <div class="player" id="player">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="player-title" id="playerTitle"></div>
        <button class="player-close" id="playerClose" title="Close" aria-label="Close">&times;</button>
      </div>
      <div class="player-status" id="playerStatus"></div>
      <div class="player-controls">
        <button class="play-btn" id="playBtn" aria-label="Play">&#9654;</button>
        <div class="progress-wrap">
          <input type="range" class="progress-bar" id="progressBar" min="0" max="1000" value="0" aria-label="Playback progress" />
          <div class="player-time">
            <span id="elapsed">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>
      </div>
    </div>

    <div class="session-list" id="sessionList"></div>

    <div class="cache-bar" id="cacheBar">
      <span id="cacheSize">Cached: 0 MB</span>
      <button class="cache-clear" id="cacheClear">Clear all downloads</button>
    </div>

    <div class="attribution">
      UCLA meditations &copy; UC Regents, <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">CC BY-NC-ND 4.0</a>.
      DoD meditations via <a href="https://www.dvidshub.net/" target="_blank" rel="noopener noreferrer">DVIDS</a>, public domain.
      VA meditations via <a href="https://www.warrelatedillness.va.gov/" target="_blank" rel="noopener noreferrer">VA WRIISC</a>.
    </div>

    <audio id="audio" preload="none"></audio>
  </div>
</main>

<script src="app.js" defer></script>
</body>
</html>
