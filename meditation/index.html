<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Box Breathing</title>
<meta name="description" content="A calm, minimal box breathing guide — 4-4-4-4 rhythm with soft ambient sound and an adjustable timer." />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta property="og:title" content="Box Breathing" />
<meta property="og:description" content="A calm, minimal box breathing guide with soft ambient sound and an adjustable timer." />
<meta property="og:type" content="website" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='15' y='15' width='70' height='70' rx='10' fill='none' stroke='%2360a5fa' stroke-width='6'/%3E%3Ccircle cx='85' cy='15' r='8' fill='%2360a5fa'/%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #334155 100%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .subtitle {
    font-size: 0.85rem;
    opacity: 0.6;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }
  .box-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 40px;
  }
  .box {
    width: 100%;
    height: 100%;
    border: 2px solid rgba(148, 163, 184, 0.3);
    border-radius: 12px;
    position: relative;
  }
  .dot {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #60a5fa;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(96, 165, 250, 0.8);
    top: -10px;
    left: -10px;
    transition: none;
  }
  .center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .phase {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .count {
    font-size: 3rem;
    font-weight: 200;
    color: #60a5fa;
  }
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: rgba(96, 165, 250, 0.15);
    color: #e2e8f0;
    border: 1px solid rgba(96, 165, 250, 0.4);
    padding: 12px 28px;
    font-size: 0.95rem;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  button:hover { background: rgba(96, 165, 250, 0.3); }
  button:active { transform: scale(0.97); }
  .toggle-row {
    margin-top: 24px;
    display: flex;
    gap: 16px;
    font-size: 0.85rem;
    opacity: 0.7;
  }
  label { cursor: pointer; }
  input[type="checkbox"] { margin-right: 6px; cursor: pointer; }
  .duration-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .chip {
    background: rgba(148, 163, 184, 0.1);
    color: #cbd5e1;
    border: 1px solid rgba(148, 163, 184, 0.25);
    padding: 8px 16px;
    font-size: 0.85rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .chip:hover { background: rgba(148, 163, 184, 0.2); }
  .chip.active {
    background: rgba(96, 165, 250, 0.25);
    border-color: rgba(96, 165, 250, 0.6);
    color: #e2e8f0;
  }
  .remaining {
    margin-top: 16px;
    font-size: 0.9rem;
    opacity: 0.6;
    letter-spacing: 0.05em;
    min-height: 1.2em;
  }
</style>
</head>
<body>
  <h1>Box Breathing</h1>
  <div class="subtitle">4 · 4 · 4 · 4</div>

  <div class="box-container">
    <div class="box"></div>
    <div class="dot" id="dot"></div>
    <div class="center-text">
      <div class="phase" id="phase">Ready</div>
      <div class="count" id="count">—</div>
    </div>
  </div>

  <div class="duration-row">
    <button class="chip" data-minutes="0">∞ Open</button>
    <button class="chip" data-minutes="2">2 min</button>
    <button class="chip active" data-minutes="5">5 min</button>
    <button class="chip" data-minutes="10">10 min</button>
    <button class="chip" data-minutes="15">15 min</button>
    <button class="chip" data-minutes="20">20 min</button>
  </div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div class="remaining" id="remaining"></div>

  <div class="toggle-row">
    <label><input type="checkbox" id="soundToggle" checked> Breath sounds</label>
  </div>

<script>
  const dot = document.getElementById('dot');
  const phaseEl = document.getElementById('phase');
  const countEl = document.getElementById('count');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const soundToggle = document.getElementById('soundToggle');
  const remainingEl = document.getElementById('remaining');
  const chips = document.querySelectorAll('.chip');

  let sessionMinutes = 5; // default
  let sessionStart = 0;
  let sessionEndChimePlayed = false;

  const SIDE = 280; // matches box width
  const PHASE_MS = 4000;
  const phases = ['Inhale', 'Hold', 'Exhale', 'Hold'];

  // Filter sweep range — kept low and narrow for a soft, mellow sound
  const FILTER_LOW = 180;
  const FILTER_HIGH = 700;
  const MAX_GAIN = 0.55;
  const CHIME_DURATION = 0.6;

  let running = false;
  let rafId = null;
  let phaseIdx = 0;
  let phaseStart = 0;
  let audioCtx = null;
  let noiseSource = null;
  let filterNode = null;
  let filterNode2 = null;
  let gainNode = null;

  function createNoiseBuffer(ctx) {
    // 3 seconds of brown noise — much softer/deeper than pink, like distant ocean
    const length = ctx.sampleRate * 3;
    const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < length; i++) {
      const white = Math.random() * 2 - 1;
      // Brown noise: integrated white noise (low-frequency dominant)
      lastOut = (lastOut + 0.02 * white) / 1.02;
      data[i] = lastOut * 3.5; // boost since brown noise is quiet
    }
    return buffer;
  }

  function ensureAudio() {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (!noiseSource) {
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.0001;

      // Two cascaded lowpass filters for a much gentler rolloff (no harshness)
      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = 'lowpass';
      filterNode.frequency.value = FILTER_LOW;
      filterNode.Q.value = 0.5;

      filterNode2 = audioCtx.createBiquadFilter();
      filterNode2.type = 'lowpass';
      filterNode2.frequency.value = FILTER_LOW;
      filterNode2.Q.value = 0.5;

      noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = createNoiseBuffer(audioCtx);
      noiseSource.loop = true;

      noiseSource.connect(filterNode).connect(filterNode2).connect(gainNode).connect(audioCtx.destination);
      noiseSource.start();
    }
  }

  function playChime(freq) {
    // Soft sine "ping" — marks phase transitions clearly but gently
    if (!soundToggle.checked || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.1, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + CHIME_DURATION);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + CHIME_DURATION + 0.05);
  }

  function setBreathSound(progress) {
    if (!gainNode || !audioCtx) return;
    const t = audioCtx.currentTime;

    if (!soundToggle.checked) {
      gainNode.gain.setTargetAtTime(0.0001, t, 0.05);
      return;
    }

    let cutoff, gain;
    switch (phaseIdx) {
      case 0: // Inhale: filter opens slightly, gentle swell
        cutoff = FILTER_LOW + (FILTER_HIGH - FILTER_LOW) * progress;
        gain = MAX_GAIN * (0.15 + 0.85 * progress);
        break;
      case 1: // Hold (full): sustained, mellow
        cutoff = FILTER_HIGH;
        gain = MAX_GAIN * 0.5;
        break;
      case 2: // Exhale: filter closes, gentle fade
        cutoff = FILTER_HIGH - (FILTER_HIGH - FILTER_LOW) * progress;
        gain = MAX_GAIN * (1 - 0.85 * progress) * 0.85 + 0.02;
        break;
      case 3: // Hold (empty): very quiet
        cutoff = FILTER_LOW;
        gain = 0.02;
        break;
    }
    filterNode.frequency.setTargetAtTime(cutoff, t, 0.1);
    filterNode2.frequency.setTargetAtTime(cutoff, t, 0.1);
    gainNode.gain.setTargetAtTime(Math.max(gain, 0.0001), t, 0.1);
  }

  function positionDot(progress) {
    // progress 0..1 along current side
    let x = 0, y = 0;
    switch (phaseIdx) {
      case 0: x = progress * SIDE; y = 0; break;            // top edge L→R
      case 1: x = SIDE; y = progress * SIDE; break;          // right edge T→B
      case 2: x = SIDE - progress * SIDE; y = SIDE; break;   // bottom edge R→L
      case 3: x = 0; y = SIDE - progress * SIDE; break;      // left edge B→T
    }
    dot.style.transform = `translate(${x}px, ${y}px)`;
  }

  function startPhase() {
    phaseStart = performance.now();
    phaseEl.textContent = phases[phaseIdx];
    // Distinct chime per phase: ascending for inhale, mid for holds, descending for exhale
    const chimeFreqs = [659, 523, 392, 523]; // E5, C5, G4, C5
    playChime(chimeFreqs[phaseIdx]);
    // Brief visual pulse on the phase label
    phaseEl.style.transition = 'none';
    phaseEl.style.opacity = '0.4';
    phaseEl.style.transform = 'scale(0.95)';
    requestAnimationFrame(() => {
      phaseEl.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      phaseEl.style.opacity = '1';
      phaseEl.style.transform = 'scale(1)';
    });
  }

  function formatTime(ms) {
    const totalSec = Math.max(0, Math.ceil(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function updateRemaining(now) {
    if (sessionMinutes === 0) {
      const elapsed = now - sessionStart;
      remainingEl.textContent = `Elapsed ${formatTime(elapsed)}`;
      return;
    }
    const totalMs = sessionMinutes * 60 * 1000;
    const left = totalMs - (now - sessionStart);
    remainingEl.textContent = `${formatTime(left)} remaining`;
    if (left <= 0 && !sessionEndChimePlayed) {
      sessionEndChimePlayed = true;
      // Triple chime to signal completion
      playChime(523);
      setTimeout(() => playChime(659), 350);
      setTimeout(() => playChime(784), 700);
      setTimeout(() => stop(true), 1400);
    }
  }

  function loop(now) {
    if (!running) return;
    const elapsed = now - phaseStart;
    const progress = Math.min(elapsed / PHASE_MS, 1);
    const secondsLeft = Math.max(1, Math.ceil((PHASE_MS - elapsed) / 1000));
    countEl.textContent = secondsLeft;
    positionDot(progress);
    setBreathSound(progress);
    updateRemaining(now);

    if (elapsed >= PHASE_MS) {
      phaseIdx = (phaseIdx + 1) % 4;
      startPhase();
    }
    rafId = requestAnimationFrame(loop);
  }

  function start() {
    if (running) return;
    running = true;
    phaseIdx = 0;
    sessionStart = performance.now();
    sessionEndChimePlayed = false;
    ensureAudio();
    startPhase();
    rafId = requestAnimationFrame(loop);
  }

  function stop(completed = false) {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (gainNode && audioCtx) gainNode.gain.setTargetAtTime(0.0001, audioCtx.currentTime, 0.05);
    phaseEl.textContent = completed ? 'Complete' : 'Ready';
    countEl.textContent = '—';
    dot.style.transform = `translate(0px, 0px)`;
    if (!completed) remainingEl.textContent = '';
  }

  // Duration chip selection
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      sessionMinutes = parseInt(chip.dataset.minutes, 10);
    });
  });

  startBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', () => stop(false));

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
