<head>

  <meta name="description" content="Hiragana practice with spaced repetition. Learn and review Japanese hiragana characters offline." />
  <meta name="theme-color" content="#ebe2cf" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ひらがな" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script type="importmap">
  {
    "imports": {
      "react": "./vendor/react.js",
      "react-dom/client": "./vendor/react-dom.js",
      "scheduler": "./vendor/scheduler.js"
    }
  }
  </script>
  <link rel="modulepreload" href="./app.js" />
  <link rel="modulepreload" href="./vendor/react.js" />
  <link rel="modulepreload" href="./vendor/react-dom.js" />
  <title>Hiragana Practice</title>
  <meta property="og:title" content="Hiragana Practice" />
  <meta property="og:description" content="Spaced-repetition hiragana practice with offline support." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; overscroll-behavior: none; }
    html { background: radial-gradient(ellipse at top, #f5efe2 0%, #ebe2cf 60%, #ddd0b3 100%); }
    body { -webkit-tap-highlight-color: transparent; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif; }
    .boot { display: flex; align-items: center; justify-content: center; height: 100%; color: #1c1917; font-size: min(48vh, 70vw); line-height: 1; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div id="root"><div class="boot" lang="ja">ひ</div></div>

  <script type="module">
    import React, { useState, useEffect, useRef } from "react";
    import { createRoot } from "react-dom/client";
    import { App } from "./app.js";

    // Register the SW; only skipWaiting when the tab is backgrounded so an
    // active study session never has its precache swapped underneath it. On
    // controllerchange we reload to run the new assets; `hadController` skips
    // that reload on first install, whose clients.claim() also fires it.
    if ("serviceWorker" in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      let reloading = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (!hadController || reloading) return;
        reloading = true;
        window.location.reload();
      });
      window.addEventListener("load", async () => {
        const reg = await navigator.serviceWorker.register("./sw.js").catch(() => null);
        if (!reg) return;
        const maybeSkip = () => {
          if (document.visibilityState === "hidden" && reg.waiting) {
            reg.waiting.postMessage({ type: "SKIP_WAITING" });
          }
        };
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          nw?.addEventListener("statechange", () => {
            if (nw.state === "installed") maybeSkip();
          });
        });
        document.addEventListener("visibilitychange", () => {
          // Home-screen launches resume from a frozen snapshot without re-running
          // load, so poll for a new SW each time the app comes forward.
          if (document.visibilityState === "visible") reg.update();
          maybeSkip();
        });
        maybeSkip();
      });
    }

    const root = createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
